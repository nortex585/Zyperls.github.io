<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohbet Admin | Pro Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #3b82f6; --red: #ef4444; --green: #10b981; }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 320px; background: #050505; border-right: 1px solid #111; height: 100vh; position: fixed; }
        .main-content { margin-left: 320px; padding: 40px; height: 100vh; overflow-y: auto; background: radial-gradient(circle at top right, #0a0a10, #000); }

        /* Player List & Search */
        .player-list { height: calc(100vh - 160px); overflow-y: auto; padding-right: 10px; }
        .player-card { 
            background: #080808; border: 1px solid #151515; transition: 0.3s; cursor: pointer;
            border-radius: 15px; margin-bottom: 10px;
        }
        .player-card:hover { border-color: var(--blue); background: #0f0f12; transform: scale(1.02); }
        .player-card.active { border-color: var(--blue); background: linear-gradient(90deg, #0f172a 0%, #000 100%); box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }

        /* Components */
        .glass-card { background: #050505; border: 1px solid #1a1a1a; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .neon-input { background: #000; border: 1px solid #222; border-radius: 10px; padding: 10px 15px; color: #fff; transition: 0.3s; }
        .neon-input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-8">
            <div class="p-2 bg-blue-600 rounded-lg shadow-lg shadow-blue-900/40">
                <i class="fas fa-database text-white"></i>
            </div>
            <h1 class="font-black text-xl tracking-tighter uppercase">Sohbet <span class="text-blue-500">Manager</span></h1>
        </div>

        <div class="relative mb-6">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600"></i>
            <input type="text" id="listSearch" onkeyup="filterList()" placeholder="Oyuncu ara..." class="w-full neon-input pl-10 text-sm">
        </div>

        <div id="playerContainer" class="player-list">
            <div class="text-zinc-700 text-center mt-20 text-sm">Veriler çekiliyor...</div>
        </div>
    </div>

    <div class="main-content flex items-center justify-center">
        
        <div id="emptyState" class="text-center opacity-30">
            <i class="fas fa-id-card-alt text-8xl mb-4"></i>
            <p class="text-xl font-medium uppercase tracking-widest">Yönetmek İçin Oyuncu Seçin</p>
        </div>

        <div id="detailPanel" class="hidden w-full max-w-3xl animate-fade">
            <div class="glass-card p-10 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-blue-500 to-transparent opacity-50"></div>
                
                <div class="flex items-center gap-10 mb-12">
                    <div class="relative group">
                        <img id="pAvatar" src="" class="w-32 h-32 rounded-full border-4 border-zinc-900 shadow-2xl transition group-hover:border-blue-500">
                        <div class="absolute bottom-2 right-2 w-6 h-6 bg-green-500 border-4 border-black rounded-full shadow-lg"></div>
                    </div>
                    <div>
                        <h2 id="pName" class="text-5xl font-black tracking-tight">---</h2>
                        <div class="flex gap-4 mt-2">
                            <span id="pId" class="text-blue-500 font-mono text-sm">ID: 000000</span>
                            <span class="text-zinc-600 text-sm">|</span>
                            <span id="pDate" class="text-zinc-600 text-sm uppercase tracking-tighter">--</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-8 mb-10">
                    <div class="bg-[#080808] p-8 rounded-3xl border border-white/5 relative group">
                        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-2">Bakiye Durumu</p>
                        <div class="text-5xl font-black text-green-500 mb-6"><span id="valTL">0</span> <span class="text-lg text-zinc-700">TL</span></div>
                        
                        <div class="space-y-3">
                            <input type="number" id="inputTL" placeholder="Miktar..." class="w-full neon-input text-sm">
                            <div class="flex gap-2">
                                <button onclick="updateData('TL', 'set')" class="flex-1 bg-white text-black font-bold py-2 rounded-lg text-[10px] hover:bg-zinc-200 transition">SET</button>
                                <button onclick="updateData('TL', 'add')" class="flex-1 bg-blue-600 font-bold py-2 rounded-lg text-[10px] hover:bg-blue-700 transition">EKLE (+)</button>
                            </div>
                        </div>
                    </div>

                    <div class="bg-[#080808] p-8 rounded-3xl border border-white/5 relative">
                        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mb-2">Oynama Süresi</p>
                        <div class="text-5xl font-black text-blue-400 mb-6"><span id="valMins">0</span> <span class="text-lg text-zinc-700">DK</span></div>
                        
                        <div class="space-y-3">
                            <input type="number" id="inputMins" placeholder="Miktar..." class="w-full neon-input text-sm">
                            <div class="flex gap-2">
                                <button onclick="updateData('Minutes', 'set')" class="flex-1 bg-white text-black font-bold py-2 rounded-lg text-[10px] hover:bg-zinc-200 transition">SET</button>
                                <button onclick="updateData('Minutes', 'add')" class="flex-1 bg-blue-600 font-bold py-2 rounded-lg text-[10px] hover:bg-blue-700 transition">EKLE (+)</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border-t border-zinc-900 pt-8 flex justify-between items-center">
                    <div>
                        <h4 class="text-sm font-bold text-zinc-400 italic italic">Tehlikeli Bölge</h4>
                        <p class="text-[10px] text-zinc-600">Bu işlem geri alınamaz.</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="resetSpecific('TL')" class="px-4 py-2 border border-zinc-800 rounded-lg text-[10px] font-bold hover:bg-red-500/10 hover:text-red-500 transition">TL SIFIRLA</button>
                        <button onclick="resetSpecific('Minutes')" class="px-4 py-2 border border-zinc-800 rounded-lg text-[10px] font-bold hover:bg-red-500/10 hover:text-red-500 transition">DK SIFIRLA</button>
                        <button onclick="wipeUser()" class="px-6 py-2 bg-red-600 rounded-lg text-[10px] font-bold hover:bg-red-700 transition shadow-lg shadow-red-900/20">KULLANICIYI SİL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE BAĞLANTISI
        const firebaseConfig = { databaseURL: "https://spyder-43f86-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUsers = {};
        let selectedId = null;

        // VERİLERİ ÇEK VE LİSTEYİ GÜNCELLE
        db.ref('users').on('value', (snap) => {
            currentUsers = snap.val() || {};
            renderList();
            if(selectedId) updateDisplay(); // Seçili oyuncu varsa ekranı güncelle
        });

        function renderList() {
            const container = document.getElementById('playerContainer');
            container.innerHTML = '';

            Object.keys(currentUsers).forEach(id => {
                const user = currentUsers[id];
                const card = document.createElement('div');
                card.className = `player-card p-4 flex items-center gap-4 ${selectedId === id ? 'active' : ''}`;
                card.id = `card-${id}`;
                card.onclick = () => selectUser(id);

                card.innerHTML = `
                    <img src="https://www.roblox.com/headshot-thumbnail/image?userId=${id}&width=150&height=150&format=png" class="w-12 h-12 rounded-full bg-zinc-900">
                    <div class="overflow-hidden">
                        <div class="font-bold text-sm truncate">${user.Name || 'Bilinmiyor'}</div>
                        <div class="text-[10px] text-zinc-600 font-mono">ID: ${id}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterList() {
            const val = document.getElementById('listSearch').value.toLowerCase();
            document.querySelectorAll('.player-card').forEach(card => {
                const name = card.querySelector('.font-bold').innerText.toLowerCase();
                card.style.display = name.includes(val) ? 'flex' : 'none';
            });
        }

        function selectUser(id) {
            selectedId = id;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('detailPanel').classList.remove('hidden');
            updateDisplay();
            
            // Aktif kartı boya
            document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${id}`).classList.add('active');
        }

        function updateDisplay() {
            const user = currentUsers[selectedId];
            if(!user) {
                document.getElementById('detailPanel').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('pName').innerText = user.Name || "Bilinmiyor";
            document.getElementById('pId').innerText = "ID: " + selectedId;
            document.getElementById('valTL').innerText = user.TL || 0;
            document.getElementById('valMins').innerText = user.Minutes || 0;
            document.getElementById('pDate').innerText = "Giriş: " + (user.SonGiris || "--");
            document.getElementById('pAvatar').src = `https://www.roblox.com/headshot-thumbnail/image?userId=${selectedId}&width=420&height=420&format=png`;
        }

        // VERİ GÜNCELLEME (SET VEYA ADD)
        async function updateData(type, mode) {
            const inputField = document.getElementById(`input${type}`);
            const amount = parseInt(inputField.value);
            if(isNaN(amount)) return alert("Sayı gir!");

            let finalValue = amount;
            if(mode === 'add') finalValue = (currentUsers[selectedId][type] || 0) + amount;

            await db.ref(`users/${selectedId}`).update({ [type]: finalValue });
            inputField.value = '';
        }

        // TEKİL SIFIRLAMA
        async function resetSpecific(type) {
            if(confirm(`${type} sıfırlansın mı?`)) {
                await db.ref(`users/${selectedId}`).update({ [type]: 0 });
            }
        }

        // KULLANICIYI KOMPLE SİL
        async function wipeUser() {
            if(confirm("DİKKAT! Bu oyuncunun tüm verilerini Firebase'den sileceksin. Emin misin?")) {
                await db.ref(`users/${selectedId}`).remove();
                selectedId = null;
            }
        }
    </script>
</body>
</html>
