<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohbet Admin | Ultimate Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* FULL BLACK THEME */
        :root { --accent: #3b82f6; --danger: #ef4444; }
        * { box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 340px; background: #050505; border-right: 1px solid #111; height: 100vh; position: fixed; z-index: 20; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .main-content { margin-left: 340px; height: 100vh; overflow-y: auto; background: radial-gradient(circle at top right, #0a0a15, #000); padding: 60px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        /* Player Cards */
        .player-list { height: calc(100vh - 200px); overflow-y: auto; margin-top: 20px; }
        .player-card { 
            background: #080808; border: 1px solid #121212; border-radius: 16px; 
            padding: 15px; margin-bottom: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .player-card:hover { border-color: var(--accent); transform: translateX(8px); background: #0c0c0f; }
        .player-card.active { border-color: var(--accent); background: linear-gradient(90deg, #0f172a, #000); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }

        /* Inputs & Buttons */
        .neon-input { background: #000; border: 1px solid #222; border-radius: 12px; padding: 12px 16px; color: #fff; width: 100%; transition: 0.3s; }
        .neon-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .btn-action { transition: 0.3s; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* Glassmorphism Detail Card */
        .detail-container { 
            background: #050505; border: 1px solid #1a1a1a; border-radius: 30px; 
            padding: 40px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative;
        }
    </style>
</head>
<body>

    <div class="sidebar p-6 flex flex-col">
        <div class="flex items-center gap-4 mb-10">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i class="fas fa-bolt text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-xl leading-none">SOHBET</h1>
                <p class="text-[10px] text-blue-500 font-bold tracking-[0.2em]">MANAGER V5</p>
            </div>
        </div>

        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600"></i>
            <input type="text" id="searchInput" onkeyup="filterPlayers()" placeholder="Oyuncu ara..." class="neon-input pl-11 text-sm">
        </div>

        <div id="playerList" class="player-list">
            <p class="text-zinc-700 text-center text-sm mt-10">Veriler yükleniyor...</p>
        </div>
    </div>

    <div class="main-content flex items-center justify-center">
        
        <div id="emptyView" class="text-center group">
            <div class="w-24 h-24 bg-zinc-900 rounded-full flex items-center justify-center mx-auto mb-6 transition group-hover:scale-110">
                <i class="fas fa-user-ninja text-4xl text-zinc-700"></i>
            </div>
            <h2 class="text-2xl font-bold text-zinc-600">BİR OYUNCU SEÇİN</h2>
            <p class="text-zinc-800 text-sm mt-2 uppercase tracking-widest font-bold">Verileri yönetmek için soldaki listeyi kullanın</p>
        </div>

        <div id="detailView" class="hidden w-full max-w-4xl">
            <div class="detail-container">
                <div class="flex items-center gap-10 mb-12">
                    <img id="mainAvatar" src="" class="w-36 h-36 rounded-full border-4 border-zinc-900 shadow-2xl bg-zinc-950">
                    <div>
                        <div class="flex items-center gap-3">
                            <h2 id="mainName" class="text-5xl font-black italic tracking-tighter uppercase text-white">---</h2>
                            <span class="bg-green-500/10 text-green-500 text-[10px] px-2 py-1 rounded border border-green-500/20 font-bold">AKTİF</span>
                        </div>
                        <p id="mainId" class="text-blue-500 font-mono mt-2 tracking-widest opacity-70">ID: 00000000</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                    <div class="bg-zinc-950 p-8 rounded-3xl border border-zinc-900 hover:border-blue-900/50 transition">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Mevcut Bakiye</p>
                                <h3 class="text-5xl font-black text-white mt-1"><span id="displayTL">0</span> <span class="text-lg text-zinc-700 font-normal">TL</span></h3>
                            </div>
                            <button onclick="resetData('TL')" class="text-red-500 hover:text-white transition text-xs font-bold bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">SIFIRLA</button>
                        </div>
                        <div class="flex gap-3">
                            <input type="number" id="inputTL" placeholder="Miktar..." class="neon-input text-sm">
                            <button onclick="changeData('TL', 'set')" class="btn-action bg-white text-black px-4 rounded-xl text-[10px]">AYARLA</button>
                            <button onclick="changeData('TL', 'add')" class="btn-action bg-blue-600 text-white px-4 rounded-xl text-[10px]">EKLE</button>
                        </div>
                    </div>

                    <div class="bg-zinc-950 p-8 rounded-3xl border border-zinc-900 hover:border-blue-900/50 transition">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest">Süre Verisi</p>
                                <h3 class="text-5xl font-black text-white mt-1"><span id="displayMins">0</span> <span class="text-lg text-zinc-700 font-normal">DK</span></h3>
                            </div>
                            <button onclick="resetData('Minutes')" class="text-red-500 hover:text-white transition text-xs font-bold bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">SIFIRLA</button>
                        </div>
                        <div class="flex gap-3">
                            <input type="number" id="inputMins" placeholder="Miktar..." class="neon-input text-sm">
                            <button onclick="changeData('Minutes', 'set')" class="btn-action bg-white text-black px-4 rounded-xl text-[10px]">AYARLA</button>
                            <button onclick="changeData('Minutes', 'add')" class="btn-action bg-blue-600 text-white px-4 rounded-xl text-[10px]">EKLE</button>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center pt-8 border-t border-zinc-900">
                    <p id="lastSeen" class="text-[10px] text-zinc-700 uppercase font-bold tracking-widest italic">Son Kayıt: --</p>
                    <button onclick="deleteUser()" class="btn-action bg-red-600/10 text-red-600 border border-red-600/30 px-8 py-3 rounded-2xl text-xs hover:bg-red-600 hover:text-white transition shadow-lg shadow-red-900/10">
                        <i class="fas fa-trash-alt mr-2"></i> KULLANICIYI VERİTABANINDAN SİL
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE AYARLARI (Senin DB adresin)
        const firebaseConfig = { databaseURL: "https://spyder-43f86-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allUsers = {};
        let selectedId = null;

        // VERİLERİ ÇEK VE OTOMATİK GÜNCELLE
        db.ref('users').on('value', (snapshot) => {
            allUsers = snapshot.val() || {};
            renderPlayerList();
            if(selectedId) updateDetailPanel();
        });

        // OYUNCU LİSTESİNİ OLUŞTUR
        async function renderPlayerList() {
            const container = document.getElementById('playerList');
            container.innerHTML = '';

            const ids = Object.keys(allUsers);
            if(ids.length === 0) {
                container.innerHTML = '<p class="text-zinc-700 text-center mt-10">Kayıtlı oyuncu yok.</p>';
                return;
            }

            for (const id of ids) {
                const user = allUsers[id];
                const card = document.createElement('div');
                card.id = `card-${id}`;
                card.className = `player-card flex items-center gap-4 ${selectedId === id ? 'active' : ''}`;
                card.onclick = () => selectUser(id);

                // Roblox API üzerinden fotoğraf çekme (En sağlam yöntem)
                const avatarImg = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png&isCircular=false`;
                
                card.innerHTML = `
                    <img id="thumb-${id}" src="https://tr.rbxcdn.com/43974f1774e6443834111f18ed4c7b2e/150/150/AvatarHeadshot/Png" class="w-12 h-12 rounded-full bg-zinc-950">
                    <div class="overflow-hidden">
                        <div class="font-bold text-sm truncate text-zinc-200">${user.Name || 'İsimsiz'}</div>
                        <div class="text-[10px] text-zinc-600 font-mono tracking-tighter">ID: ${id}</div>
                    </div>
                `;
                container.appendChild(card);

                // Gerçek fotoğrafı asenkron olarak yükle
                fetch(avatarImg).then(r => r.json()).then(data => {
                    if(data.data[0]) document.getElementById(`thumb-${id}`).src = data.data[0].imageUrl;
                });
            }
        }

        // ARAMA FİLTRESİ
        function filterPlayers() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.player-card').forEach(card => {
                const name = card.querySelector('.font-bold').innerText.toLowerCase();
                card.style.display = name.includes(q) ? 'flex' : 'none';
            });
        }

        // OYUNCU SEÇİMİ
        function selectUser(id) {
            selectedId = id;
            document.getElementById('emptyView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            updateDetailPanel();
            
            // Kartları güncelle
            document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${id}`).classList.add('active');
        }

        // DETAY PANELİNİ GÜNCELLE
        function updateDetailPanel() {
            const user = allUsers[selectedId];
            if(!user) return;

            document.getElementById('mainName').innerText = user.Name || "Bilinmiyor";
            document.getElementById('mainId').innerText = "ID: " + selectedId;
            document.getElementById('displayTL').innerText = user.TL || 0;
            document.getElementById('displayMins').innerText = user.Minutes || 0;
            document.getElementById('lastSeen').innerText = "Son Kayıt: " + (user.SonGiris || "---");

            // Büyük fotoğrafı çek
            const largeAvatar = `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${selectedId}&size=420x420&format=Png&isCircular=false`;
            fetch(largeAvatar).then(r => r.json()).then(data => {
                if(data.data[0]) document.getElementById('mainAvatar').src = data.data[0].imageUrl;
            });
        }

        // VERİ GÜNCELLEME (SET / ADD)
        async function changeData(type, mode) {
            const val = parseInt(document.getElementById(`input${type}`).value);
            if(isNaN(val)) return alert("Lütfen geçerli bir sayı gir!");

            let newValue = val;
            if(mode === 'add') {
                newValue = (allUsers[selectedId][type] || 0) + val;
            }

            await db.ref(`users/${selectedId}`).update({ [type]: newValue });
            document.getElementById(`input${type}`).value = '';
        }

        // SIFIRLAMA
        async function resetData(type) {
            if(confirm(`${type} verisini 0 yapmak istediğine emin misin?`)) {
                await db.ref(`users/${selectedId}`).update({ [type]: 0 });
            }
        }

        // KULLANICIYI SİL
        async function deleteUser() {
            if(confirm("DİKKAT! Bu oyuncu veritabanından tamamen silinecek. Onaylıyor musun?")) {
                await db.ref(`users/${selectedId}`).remove();
                selectedId = null;
                document.getElementById('detailView').classList.add('hidden');
                document.getElementById('emptyView').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
